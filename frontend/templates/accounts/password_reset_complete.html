{% extends 'base.html' %}

{% block title %}Password Reset Complete - Farm Connect{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg">
            <div class="card-body text-center">
                <i class="bi bi-check-circle text-success feature-icon-xl"></i>
                <h3 class="text-success mb-4">Password reset successful!</h3>
                <p>Your password has been successfully reset.</p>
                <p>You can now log in with your new password.</p>
                <div class="mt-4">
                    <a href="{% url 'accounts:login' %}" class="btn btn-success">Log In</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
