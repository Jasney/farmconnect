


{% extends 'base.html' %}

{% block title %}Reset Password - Farm Connect{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg">
            <div class="card-body">
                <h3 class="text-success mb-4">Set a new password</h3>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="new_password1" class="form-label">New Password</label>
                        <input type="password" name="new_password1" id="new_password1" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="new_password2" class="form-label">Confirm New Password</label>
                        <input type="password" name="new_password2" id="new_password2" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Reset password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
