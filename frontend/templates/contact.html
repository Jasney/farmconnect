{% extends 'base.html' %}
{% load static %}

{% block title %}Contact - Farm Connect{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <!-- Header Section -->
            <div class="glass-dark text-center mb-4">
                <i class="bi bi-envelope display-4 mb-3" style="color: #7dd33f; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);"></i>
                <h2 class="mb-0">Get in Touch</h2>
            </div>
            
            <div class="row g-4">
                <!-- Contact Info Section -->
                <div class="col-md-6">
                    <div class="glass-card">
                        <h5 style="color: #a5e07f; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);"><i class="bi bi-geo-alt me-2" style="color: #a5e07f;"></i>Contact Info</h5>
                        <ul class="list-unstyled mb-0">
                            <li class="mb-2">
                                <i class="bi bi-telephone me-2 text-success"></i>
                                +254 700 123 456
                            </li>
                            <li class="mb-2">
                                <i class="bi bi-envelope me-2 text-success"></i>
                                support@farmconnect.co.ke
                            </li>
                            <li>
                                <i class="bi bi-clock me-2 text-success"></i>
                                Mon - Fri: 8AM - 6PM
                            </li>
                        </ul>
                    </div>
                </div>
                
                <!-- Message Form Section -->
                <div class="col-md-6">
                    <div class="glass-card">
                        <h5 style="color: #a5e07f; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);">Send us a message</h5>
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="name" class="form-label">Name</label>
                                <input type="text" class="form-control" name="name" id="name" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" name="email" id="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="message" class="form-label">Message</label>
                                <textarea class="form-control" name="message" id="message" rows="4" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-success w-100 mt-3">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
